<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <!-- 透明背景 -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16A34A"/>
    </marker>
    <marker id="arr-o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EA580C"/>
    </marker>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- ── 标题 ── -->
  <text x="350" y="30" text-anchor="middle" fill="#F97316" font-size="15" font-weight="700">
    WARP 透明代理链路 — Google Gemini 送中
  </text>
  <text x="350" y="48" text-anchor="middle" fill="#6B7280" font-size="10">
    iptables 拦截 Google IP 段 → ipt2socks → warp-svc → Cloudflare WARP → Google
  </text>

  <!-- ══ 节点（纵向排列，左右两列） ══ -->

  <!-- [1] 应用程序 -->
  <g filter="url(#sh)">
    <rect x="40" y="70" width="160" height="50" rx="9" fill="#0F2A1A" stroke="#16A34A" stroke-width="1.5"/>
    <text x="120" y="92" text-anchor="middle" fill="#86EFAC" font-size="11" font-weight="600">应用程序</text>
    <text x="120" y="108" text-anchor="middle" fill="#4ADE80" font-size="10">curl / Python SDK / Node.js …</text>
  </g>

  <!-- [2] iptables OUTPUT -->
  <g filter="url(#sh)">
    <rect x="40" y="160" width="160" height="52" rx="9" fill="#1A1208" stroke="#D97706" stroke-width="1.5"/>
    <text x="120" y="181" text-anchor="middle" fill="#FDE68A" font-size="11" font-weight="600">iptables OUTPUT</text>
    <text x="120" y="197" text-anchor="middle" fill="#FCA96A" font-size="10">WARP_GOOGLE 链</text>
    <text x="120" y="207" text-anchor="middle" fill="#D97706" font-size="9">ipset warp_google4 命中</text>
  </g>

  <!-- [3] ipt2socks -->
  <g filter="url(#sh)">
    <rect x="40" y="256" width="160" height="50" rx="9" fill="#0A1A2E" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="120" y="277" text-anchor="middle" fill="#BFDBFE" font-size="11" font-weight="600">ipt2socks</text>
    <text x="120" y="293" text-anchor="middle" fill="#93C5FD" font-size="10">透明 SOCKS5 转发  :12345</text>
  </g>

  <!-- [4] warp-svc SOCKS5 -->
  <g filter="url(#sh)">
    <rect x="270" y="256" width="160" height="50" rx="9" fill="#1A0A0A" stroke="#DC2626" stroke-width="1.5"/>
    <text x="350" y="277" text-anchor="middle" fill="#FECACA" font-size="11" font-weight="600">warp-svc</text>
    <text x="350" y="293" text-anchor="middle" fill="#FCA5A5" font-size="10">SOCKS5 代理  :40000</text>
  </g>

  <!-- [5] Cloudflare WARP 隧道 -->
  <g filter="url(#sh)">
    <rect x="270" y="160" width="160" height="52" rx="9" fill="#F97316" fill-opacity="0.12" stroke="#F97316" stroke-width="1.5"/>
    <text x="350" y="181" text-anchor="middle" fill="#FDBA74" font-size="11" font-weight="600">Cloudflare WARP</text>
    <text x="350" y="197" text-anchor="middle" fill="#FED7AA" font-size="10">MASQUE / WireGuard 隧道</text>
    <text x="350" y="207" text-anchor="middle" fill="#F97316" font-size="9">CF 网络出口 → 非中国 IP</text>
  </g>

  <!-- [6] Google / Gemini -->
  <g filter="url(#sh)">
    <rect x="270" y="70" width="160" height="50" rx="9" fill="#0F2A0F" stroke="#16A34A" stroke-width="1.5"/>
    <text x="350" y="92" text-anchor="middle" fill="#86EFAC" font-size="11" font-weight="600">Google / Gemini</text>
    <text x="350" y="108" text-anchor="middle" fill="#4ADE80" font-size="10">www.google.com  /  gemini API</text>
  </g>

  <!-- ══ UDP 阻断 ══ -->
  <g filter="url(#sh)">
    <rect x="500" y="160" width="160" height="52" rx="9" fill="#1A0A0A" stroke="#7F1D1D" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="580" y="181" text-anchor="middle" fill="#FCA5A5" font-size="11" font-weight="600">iptables REJECT</text>
    <text x="580" y="197" text-anchor="middle" fill="#F87171" font-size="10">阻断 UDP 443（QUIC）</text>
    <text x="580" y="207" text-anchor="middle" fill="#EF4444" font-size="9">强制 TCP/TLS 路径</text>
  </g>

  <!-- ══ 连接线 ══ -->

  <!-- [1]→[2] TCP → Google IP -->
  <line x1="120" y1="120" x2="120" y2="159" stroke="#16A34A" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="133" y="144" fill="#4ADE80" font-size="9">TCP → Google IP:443</text>

  <!-- [2]→[3] REDIRECT :12345 -->
  <line x1="120" y1="212" x2="120" y2="255" stroke="#D97706" stroke-width="2" marker-end="url(#arr)"/>
  <text x="133" y="238" fill="#FDE68A" font-size="9">REDIRECT :12345</text>

  <!-- [3]→[4] SOCKS5 CONNECT -->
  <line x1="200" y1="281" x2="269" y2="281" stroke="#3B82F6" stroke-width="2" marker-end="url(#arr)"/>
  <text x="234" y="274" text-anchor="middle" fill="#93C5FD" font-size="9">SOCKS5</text>
  <text x="234" y="285" text-anchor="middle" fill="#60A5FA" font-size="9">CONNECT</text>

  <!-- [4]→[5] → WARP tunnel -->
  <line x1="350" y1="256" x2="350" y2="213" stroke="#F97316" stroke-width="2" marker-end="url(#arr-o)"/>
  <text x="365" y="238" fill="#FED7AA" font-size="9">WARP 隧道</text>

  <!-- [5]→[6] → Google -->
  <line x1="350" y1="160" x2="350" y2="121" stroke="#16A34A" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="365" y="144" fill="#86EFAC" font-size="9">解封装 → 目标</text>

  <!-- UDP 阻断虚线 -->
  <line x1="200" y1="192" x2="499" y2="192" stroke="#7F1D1D" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="350" y="155" text-anchor="middle" fill="#F87171" font-size="9">UDP 443 (QUIC) ──✕── REJECT</text>

  <!-- ══ 旁注 ══ -->
  <text x="500" y="80" fill="#6B7280" font-size="9">▶ SO_ORIGINAL_DST 恢复真实目标</text>
  <text x="500" y="93" fill="#6B7280" font-size="9">▶ warp-keepalive 每 10 分钟自愈</text>
  <text x="500" y="106" fill="#6B7280" font-size="9">▶ 其他流量不受任何影响</text>

  <!-- ipset 注解 -->
  <rect x="40" y="330" width="220" height="36" rx="6" fill="#1C1108" stroke="#92400E" stroke-width="1"/>
  <text x="50" y="345" fill="#FDE68A" font-size="9" font-weight="600">ipset warp_google4</text>
  <text x="50" y="359" fill="#D97706" font-size="9">~60 条 Google 全量 IPv4 段，热更新</text>

  <!-- 水印 -->
  <text x="690" y="375" text-anchor="end" fill="#374151" font-size="10">www.flytoex.com</text>
</svg>
